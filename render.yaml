services:
  # 1. Redis - Managed Instance
  - type: redis
    name: currency-redis
    plan: free
    ipAllowList: [] 

  # 2. Backend API
  - type: web
    name: currency-api
    env: docker
    # Using root context '.' allows the builder to see the 'backend' folder
    dockerContext: ./backend
    dockerfilePath: Dockerfile 
    plan: free
    envVars:
      - key: OPENEXCHANGERATES_API_KEY
        sync: false
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_HOST
        value: currency-redis
      - key: REDIS_PORT
        value: "6379"

  # 3. Frontend Web
  - type: web
    name: currency-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile 
    plan: free
    # ADD THIS: This passes the backend address into the Docker BUILD step
    dockerBuildArgs:
      - arg: REACT_APP_API_URL
        fromService:
          type: web
          name: currency-api
          property: host
    envVars:
      - key: PORT
        value: "3000"
