services:
  # 1. Redis
  - type: redis
    name: currency-redis
    plan: free
    ipAllowList: []

  # 2. Backend
  - type: web
    name: currency-api
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: OPENEXCHANGERATES_API_KEY
        sync: false
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_HOST
        fromRedis:
          name: currency-redis
          property: host
      - key: REDIS_PORT
        fromRedis:
          name: currency-redis
          property: port

  # 3. Frontend
  - type: web
    name: currency-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: currency-api
          property: host
