services:
  # Redis - Using Render's managed Redis
  - type: redis
    name: currency-redis
    plan: free
    ipAllowList: [] # Internal access only for security

  # Backend API
  - type: web
    name: currency-api
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_HOST
        fromRedisName: currency-redis
        property: host
      - key: REDIS_PORT
        fromRedisName: currency-redis
        property: port
      - key: OPENEXCHANGERATES_API_KEY
        sync: false # You will manually paste this in the dashboard

  # Frontend Web
  - type: web
    name: currency-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: currency-api
          property: host
