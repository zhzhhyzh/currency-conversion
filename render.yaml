services:
  # 1. Redis
  - type: redis
    name: currency-redis
    plan: free
    ipAllowList: []

  # 2. Backend
  - type: web
    name: currency-api
    env: docker
    dockerContext: ./backend
    # CHANGED: Path is relative to the context (./backend)
    dockerfilePath: Dockerfile 
    plan: free
    envVars:
      - key: OPENEXCHANGERATES_API_KEY
        sync: false
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_HOST
        value: currency-redis
      - key: REDIS_PORT
        value: "6379"

  # 3. Frontend
  - type: web
    name: currency-frontend
    env: docker
    dockerContext: ./frontend
    # CHANGED: Path is relative to the context (./frontend)
    dockerfilePath: Dockerfile 
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: currency-api
          property: host
