services:
  # 1. Redis
  - type: redis
    name: currency-redis
    plan: free
    ipAllowList: []

  # 2. Backend
  - type: web
    name: currency-api
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: OPENEXCHANGERATES_API_KEY
        sync: false # You will enter this value in the Dashboard
      - key: REDIS_ENABLED
        value: "true"
      # FIXED SYNTAX FOR REDIS HOST
      - key: REDIS_HOST
        fromRedisName: currency-redis
        property: host
      # FIXED SYNTAX FOR REDIS PORT
      - key: REDIS_PORT
        fromRedisName: currency-redis
        property: port

  # 3. Frontend
  - type: web
    name: currency-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      # FIXED SYNTAX FOR BACKEND HOST
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: currency-api
          property: host
