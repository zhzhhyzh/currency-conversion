services:
  # 1. Redis
  - type: redis
    name: currency-redis
    plan: free

  # 2. Backend
  - type: web
    name: currency-api
    # FIX: Changed 'runtime' to 'env' for Docker services
    env: docker
    # rootDir changes the 'starting point' to the backend folder
    rootDir: backend
    # Relative to rootDir (so this looks for backend/Dockerfile)
    dockerfilePath: Dockerfile 
    # Relative to rootDir (so this uses the backend folder as context)
    dockerContext: .
    plan: free
    envVars:
      - key: REDIS_HOST
        value: currency-redis
      - key: REDIS_PORT
        value: "6379"
      - key: OPENEXCHANGERATES_API_KEY
        sync: false

  # 3. Frontend
  - type: web
    name: currency-frontend
    env: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    dockerBuildArgs:
      - arg: REACT_APP_API_URL
        fromService:
          type: web
          name: currency-api
          property: host
    envVars:
      - key: PORT
        value: "3000"
