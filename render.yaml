services:
  - type: keyvalue
    name: currency-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: currency-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: OPENEXCHANGERATES_API_KEY
        sync: false
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: currency-redis
          property: connectionString
      - key: EXCHANGE_RATES_SCHEDULE_ENABLED
        value: "false"

  - type: web
    name: currency-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://currency-api.onrender.com/api
