spring.application.name=currency-conversion-api
server.port=8080

# API Configuration
openexchangerates.api.key=${OPENEXCHANGERATES_API_KEY}
openexchangerates.api.url=https://openexchangerates.org/api/latest.json

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=2000
redis.enabled=${REDIS_ENABLED:true}

# Keep external API calls demand-driven by default.
# Set EXCHANGE_RATES_SCHEDULE_ENABLED=true to refresh cache in the background.
exchange-rates.schedule.enabled=${EXCHANGE_RATES_SCHEDULE_ENABLED:false}

# Logging
logging.level.root=INFO
logging.level.com.currency=DEBUG

# Jackson configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Server configuration
server.servlet.context-path=/

# Connection Pool
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=2

